---
# ─────────────────────────────────────────────────────────────────────────────
# IBM Continuous Delivery — Tekton Pipeline Definition
# Repo: github.com/cbagade/toolchain-app
#
# Stages (in order):
#   setup → test → static-scan → containerize
#
# Each Task reads .pipeline-config.yaml stage scripts via a shared workspace
# volume so all tasks operate on the same checked-out source tree.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: toolchain-app-pipeline
spec:
  params:
    - name: repository
      description: Source Git repository URL
    - name: branch
      description: Git branch to build
      default: main
    - name: revision
      description: Git commit SHA
      default: ""
    - name: DOCKERHUB_USERNAME
      description: Docker Hub username
    - name: DOCKERHUB_TOKEN
      description: Docker Hub access token (secret)
    - name: IMAGE_NAME
      description: Docker image name (without registry prefix)
      default: toolchain-app
    - name: IMAGE_TAG
      description: Docker image tag
      default: latest
  workspaces:
    - name: source
  tasks:
    # ── 1. Clone ──────────────────────────────────────────────────────────────
    - name: clone
      taskSpec:
        params:
          - name: repository
          - name: branch
          - name: revision
        workspaces:
          - name: source
        steps:
          - name: clone
            image: icr.io/continuous-delivery/pipeline/pipeline-base-ubi:latest
            workingDir: $(workspaces.source.path)
            script: |
              #!/usr/bin/env bash
              set -euo pipefail

              # Clean workspace in case of a retry or reuse
              rm -rf ./* ./.git ./.tekton 2>/dev/null || true

              # Strip "refs/heads/" prefix if present — git clone needs short name
              BRANCH="$(params.branch)"
              BRANCH="${BRANCH#refs/heads/}"

              echo "==> [clone] Cloning $(params.repository) @ ${BRANCH}"

              git clone --depth 1 --branch "${BRANCH}" \
                "$(params.repository)" .

              if [ -n "$(params.revision)" ]; then
                git checkout "$(params.revision)"
              fi
              echo "==> [clone] Done — $(git log -1 --oneline)"
      params:
        - name: repository
          value: $(params.repository)
        - name: branch
          value: $(params.branch)
        - name: revision
          value: $(params.revision)
      workspaces:
        - name: source
          workspace: source

    # ── 2. Setup ──────────────────────────────────────────────────────────────
    - name: setup
      runAfter: [clone]
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: setup
            image: python:3.11-slim
            workingDir: $(workspaces.source.path)
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              echo "==> [setup] Installing pip dependencies into cache"
              pip install --upgrade pip
              pip install --cache-dir="${HOME}/.cache/pip" -r requirements.txt
              echo "==> [setup] Dependency installation complete"
              pip list
      workspaces:
        - name: source
          workspace: source

    # ── 3. Test ───────────────────────────────────────────────────────────────
    - name: test
      runAfter: [setup]
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: test
            image: python:3.11-slim
            workingDir: $(workspaces.source.path)
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              echo "==> [test] Installing dependencies"
              pip install --cache-dir="${HOME}/.cache/pip" -r requirements.txt
              echo "==> [test] Running unit tests via unittest discover"
              python -m unittest discover \
                --start-directory . \
                --pattern "test_*.py" \
                --verbose
              echo "==> [test] All tests passed"
      workspaces:
        - name: source
          workspace: source

    # ── 4. Static Scan ────────────────────────────────────────────────────────
    - name: static-scan
      runAfter: [test]
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: static-scan
            image: python:3.11-slim
            workingDir: $(workspaces.source.path)
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              echo "==> [static-scan] Installing Bandit SAST tool"
              pip install bandit

              echo "==> [static-scan] Running Bandit — saving JSON report"
              bandit \
                --recursive . \
                --severity-level low \
                --confidence-level low \
                --format json \
                --output bandit-report.json \
                || true

              echo "==> [static-scan] Bandit human-readable summary"
              bandit \
                --recursive . \
                --severity-level low \
                --confidence-level low \
                || true

              echo "==> [static-scan] Checking for HIGH severity issues (hard gate)"
              # Fail the pipeline ONLY if HIGH severity vulnerabilities are found
              HIGH=$(bandit --recursive . --severity-level high --confidence-level high --format json 2>/dev/null \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('results',[])))")
              if [ "${HIGH}" -gt 0 ]; then
                echo "FAIL: ${HIGH} HIGH severity issue(s) found — pipeline aborted"
                exit 1
              fi
              echo "==> [static-scan] No HIGH severity issues — scan passed (${HIGH} high findings)"
              echo "==> [static-scan] Complete — report saved to bandit-report.json"
      workspaces:
        - name: source
          workspace: source

    # ── 5. Containerize (Kaniko — daemonless, no Docker socket needed) ─────────
    - name: containerize
      runAfter: [static-scan]
      taskSpec:
        params:
          - name: DOCKERHUB_USERNAME
          - name: DOCKERHUB_TOKEN
          - name: IMAGE_NAME
          - name: IMAGE_TAG
        workspaces:
          - name: source
        steps:
          # Step 1: Write Docker Hub credentials into the Kaniko config dir
          - name: write-dockerconfig
            image: busybox
            workingDir: $(workspaces.source.path)
            script: |
              #!/bin/sh
              set -e
              echo "==> [containerize] Writing Docker Hub credentials for Kaniko"
              mkdir -p /kaniko/.docker
              # Encode credentials as base64 for Docker config.json
              AUTH=$(echo -n "$(params.DOCKERHUB_USERNAME):$(params.DOCKERHUB_TOKEN)" | base64 | tr -d '\n')
              cat > /kaniko/.docker/config.json <<EOF
              {
                "auths": {
                  "https://index.docker.io/v1/": {
                    "auth": "${AUTH}"
                  }
                }
              }
              EOF
              echo "==> [containerize] Docker credentials written"
            volumeMounts:
              - name: kaniko-secret
                mountPath: /kaniko/.docker

          # Step 2: Build and push both tags using Kaniko
          - name: build-and-push
            image: gcr.io/kaniko-project/executor:latest
            workingDir: $(workspaces.source.path)
            args:
              - --dockerfile=Dockerfile
              - --context=$(workspaces.source.path)
              - --destination=$(params.DOCKERHUB_USERNAME)/$(params.IMAGE_NAME):$(params.IMAGE_TAG)
              - --destination=$(params.DOCKERHUB_USERNAME)/$(params.IMAGE_NAME):latest
              - --build-arg=APP_VERSION=$(params.IMAGE_TAG)
              - --verbosity=info
            volumeMounts:
              - name: kaniko-secret
                mountPath: /kaniko/.docker
        volumes:
          - name: kaniko-secret
            emptyDir: {}
      params:
        - name: DOCKERHUB_USERNAME
          value: $(params.DOCKERHUB_USERNAME)
        - name: DOCKERHUB_TOKEN
          value: $(params.DOCKERHUB_TOKEN)
        - name: IMAGE_NAME
          value: $(params.IMAGE_NAME)
        - name: IMAGE_TAG
          value: $(params.IMAGE_TAG)
      workspaces:
        - name: source
          workspace: source
